services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app1:
    build: .
    environment:
      - SERVER_PORT=8080
      - REDIS_HOST=redis
      - INSTANCE_ID=app1
    depends_on:
      - redis

  app2:
    build: .
    environment:
      - SERVER_PORT=8080
      - REDIS_HOST=redis
      - INSTANCE_ID=app2
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
