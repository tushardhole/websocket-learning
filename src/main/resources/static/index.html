<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebSocket Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        body { font-family: monospace; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .layout { display: flex; gap: 16px; }
        .chat-panel { flex: 1; }
        .users-panel { width: 180px; }
        #chat-log { background: #1a1a1a; color: #eee; padding: 16px; height: 350px; overflow-y: auto; border-radius: 4px; }
        #online-users { background: #1a1a1a; color: #eee; padding: 16px; height: 350px; overflow-y: auto; border-radius: 4px; }
        .msg { margin: 6px 0; }
        .msg .sender { font-weight: bold; color: #6cf; }
        .private { color: #f6f; }
        .system { color: #f90; font-style: italic; }
        .error { color: #f33; font-weight: bold; }
        input, button, select { font-family: monospace; font-size: 14px; padding: 8px; }
        #message { width: 55%; }
        button { cursor: pointer; }
        #status { padding: 4px 8px; border-radius: 4px; font-size: 12px; display: inline-block; margin-left: 8px; }
        .status-connected { background: #0f02; color: #0f0; border: 1px solid #0f0; }
        .status-disconnected { background: #f002; color: #f33; border: 1px solid #f33; }
        .status-reconnecting { background: #ff02; color: #fa0; border: 1px solid #fa0; }
        .controls { margin: 12px 0; }
        .send-row { margin-top: 12px; }
        .user-item { padding: 4px 0; color: #0f0; }
        h4 { color: #999; margin: 0 0 8px 0; }
        #reconnect-info { font-size: 11px; color: #888; margin-top: 4px; }
        .token-display { font-size: 10px; color: #666; word-break: break-all; margin-top: 4px; max-width: 600px; }
    </style>
</head>
<body>
    <h2>WebSocket Chat</h2>

    <div class="controls">
        <input id="username" type="text" placeholder="Your name">
        <select id="role">
            <option value="USER">USER</option>
            <option value="ADMIN">ADMIN</option>
        </select>
        <button id="connectBtn" onclick="login()">Login & Connect</button>
        <button id="disconnectBtn" onclick="manualDisconnect()" disabled>Disconnect</button>
        <span id="status" class="status-disconnected">DISCONNECTED</span>
        <div id="reconnect-info"></div>
        <div id="token-display" class="token-display"></div>
    </div>

    <div class="layout">
        <div class="chat-panel">
            <div id="chat-log"></div>
            <div class="send-row">
                <select id="sendMode" disabled>
                    <option value="public">Public</option>
                    <option value="private">Private to:</option>
                </select>
                <input id="recipient" type="text" placeholder="username" style="width:80px; display:none;">
                <input id="message" type="text" placeholder="Type a message..." onkeypress="if(event.key==='Enter') send()" disabled>
                <button id="sendBtn" onclick="send()" disabled>Send</button>
            </div>
        </div>
        <div class="users-panel">
            <h4>Online Users</h4>
            <div id="online-users"></div>
        </div>
    </div>

    <script>
        let stompClient = null;
        let currentUser = '';
        let jwtToken = '';
        let reconnectAttempts = 0;
        let maxReconnectAttempts = 5;
        let reconnectTimer = null;
        let intentionalDisconnect = false;

        function log(html) {
            const el = document.getElementById('chat-log');
            el.innerHTML += html;
            el.scrollTop = el.scrollHeight;
        }

        function setStatus(state) {
            const status = document.getElementById('status');
            const info = document.getElementById('reconnect-info');
            const connected = state === 'connected';
            const reconnecting = state === 'reconnecting';

            document.getElementById('connectBtn').disabled = connected || reconnecting;
            document.getElementById('disconnectBtn').disabled = !connected && !reconnecting;
            document.getElementById('username').disabled = connected || reconnecting;
            document.getElementById('role').disabled = connected || reconnecting;
            document.getElementById('message').disabled = !connected;
            document.getElementById('sendBtn').disabled = !connected;
            document.getElementById('sendMode').disabled = !connected;

            if (state === 'connected') {
                status.textContent = 'CONNECTED';
                status.className = 'status-connected';
                info.textContent = '';
            } else if (state === 'reconnecting') {
                status.textContent = 'RECONNECTING';
                status.className = 'status-reconnecting';
            } else {
                status.textContent = 'DISCONNECTED';
                status.className = 'status-disconnected';
                info.textContent = '';
            }
        }

        document.getElementById('sendMode').addEventListener('change', function() {
            document.getElementById('recipient').style.display =
                this.value === 'private' ? 'inline' : 'none';
        });

        function getReconnectDelay() {
            return Math.min(1000 * Math.pow(2, reconnectAttempts), 16000);
        }

        function scheduleReconnect() {
            if (intentionalDisconnect || reconnectAttempts >= maxReconnectAttempts) {
                if (reconnectAttempts >= maxReconnectAttempts) {
                    log('<div class="msg error">Reconnection failed after ' + maxReconnectAttempts + ' attempts.</div>');
                    setStatus('disconnected');
                }
                return;
            }
            const delay = getReconnectDelay();
            const seconds = (delay / 1000).toFixed(0);
            document.getElementById('reconnect-info').textContent =
                'Attempt ' + (reconnectAttempts + 1) + '/' + maxReconnectAttempts + ' in ' + seconds + 's...';
            setStatus('reconnecting');
            log('<div class="msg system">Reconnecting in ' + seconds + 's...</div>');
            reconnectTimer = setTimeout(function() {
                reconnectAttempts++;
                doConnect();
            }, delay);
        }

        function login() {
            currentUser = document.getElementById('username').value.trim();
            const role = document.getElementById('role').value;
            if (!currentUser) { alert('Enter a username'); return; }

            fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentUser, role: role })
            })
            .then(r => r.json())
            .then(data => {
                jwtToken = data.token;
                document.getElementById('token-display').textContent = 'JWT: ' + jwtToken.substring(0, 40) + '...';
                log('<div class="msg system">Logged in as ' + currentUser + ' (role: ' + role + ')</div>');
                intentionalDisconnect = false;
                reconnectAttempts = 0;
                doConnect();
            })
            .catch(err => {
                log('<div class="msg error">Login failed: ' + err + '</div>');
            });
        }

        function doConnect() {
            const socket = new SockJS('/ws/chat?token=' + encodeURIComponent(jwtToken));
            stompClient = Stomp.over(socket);

            stompClient.connect({}, function(frame) {
                reconnectAttempts = 0;
                setStatus('connected');
                log('<div class="msg system">WebSocket connected</div>');

                stompClient.subscribe('/topic/messages', function(msg) {
                    const m = JSON.parse(msg.body);
                    if (m.type === 'CHAT') {
                        log('<div class="msg"><span class="sender">' + m.sender + ':</span> ' + m.content + '</div>');
                    } else if (m.type === 'JOIN') {
                        log('<div class="msg system">' + m.sender + ' joined</div>');
                        refreshUsers();
                    } else if (m.type === 'LEAVE') {
                        log('<div class="msg system">' + m.sender + ' left</div>');
                        refreshUsers();
                    }
                });

                stompClient.subscribe('/user/queue/private', function(msg) {
                    const m = JSON.parse(msg.body);
                    log('<div class="msg private">[PM from ' + m.sender + ']: ' + m.content + '</div>');
                });

                stompClient.subscribe('/user/queue/errors', function(msg) {
                    const err = JSON.parse(msg.body);
                    log('<div class="msg error">Server error: ' + err.error + '</div>');
                });

                refreshUsers();
            }, function(error) {
                log('<div class="msg error">Connection lost</div>');
                setStatus('disconnected');
                scheduleReconnect();
            });
        }

        function send() {
            const input = document.getElementById('message');
            const text = input.value.trim();
            if (!text || !stompClient) return;

            const mode = document.getElementById('sendMode').value;
            if (mode === 'private') {
                const recipient = document.getElementById('recipient').value.trim();
                if (!recipient) { alert('Enter recipient username'); return; }
                stompClient.send('/app/private', {}, JSON.stringify({
                    recipient: recipient, content: text
                }));
                log('<div class="msg private">[PM to ' + recipient + ']: ' + text + '</div>');
            } else {
                stompClient.send('/app/chat', {}, JSON.stringify({
                    sender: currentUser, content: text, type: 'CHAT'
                }));
            }
            input.value = '';
        }

        function refreshUsers() {
            fetch('/users/online')
                .then(r => r.json())
                .then(users => {
                    document.getElementById('online-users').innerHTML =
                        users.map(u => '<div class="user-item">' + u + '</div>').join('');
                });
        }

        function manualDisconnect() {
            intentionalDisconnect = true;
            if (reconnectTimer) clearTimeout(reconnectTimer);
            if (stompClient) stompClient.disconnect();
            setStatus('disconnected');
            log('<div class="msg system">Disconnected</div>');
            document.getElementById('online-users').innerHTML = '';
        }
    </script>
</body>
</html>
